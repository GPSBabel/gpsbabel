name: "build docker archive"
permissions: {}

on: 
  workflow_call:
    inputs:
      version:
        description: 'verison to archive'
        required: false
        default: dev
        type: string
      latest:
        description: 'tag with latest?'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: 'verison to archive'
        required: true
        type: string
      latest:
        description: 'tag with latest?'
        required: false
        default: false
        type: boolean

jobs:
  docker:
    name: docker Build
    runs-on: ubuntu-latest
    env:
      docker_repository: ${{ case(github.repository == 'GPSBabel/gpsbabel', 'tsteven4/gpsbabel', 'tsteven4/testing') }}
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: tsteven4
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and export to Docker
      uses: docker/build-push-action@v7
      with:
        context: "{{defaultContext}}:tools/archive_images"
        file: "Dockerfile_gpsbabel_${{ inputs.version }}"
        load: true
        tags: "${{ env.docker_repository }}:test_${{ inputs.version }}"
    - name: Test
      run: |
        # tests failed before 1.6.0 (and repository structure was different)
        if [[ "${{ inputs.version }}" == "dev" || $(echo -e "${{ inputs.version }}\n1.6.0" | sort -V | head -n1) == "1.6.0" ]]; then
          docker run -i -t --rm -w /home/gpsbabel/gpsbabel-build -e PNAME=/usr/local/bin/gpsbabel "${{ env.docker_repository }}:test_${{ inputs.version }}" ./testo
        fi
    - name: Docker Metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        flavor: |
          latest=false
        images: |
          ${{ env.docker_repository }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=${{ inputs.version }}_{{date 'YYYYMMDD[T]HHmmss[Z]' tz='UTC'}}
          type=raw,value=latest,enable=${{ inputs.latest }}
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: "{{defaultContext}}:tools/archive_images"
        file: "Dockerfile_gpsbabel_${{ inputs.version }}"
        push: true
        tags: ${{ steps.meta.outputs.tags }}
